    <div class="container">
        <div class="birthday-image">🎂</div>
        <h1>郑佳宜，生日快乐！</h1>
        <div class="birthday-message">
            <p>亲爱的佳宜：</p>
            <p>在这个特别的日子里，祝你生日快乐！愿你好好休息，少一点焦虑，多一点快乐。</p>
            <p>初中的时光是我们最美好的回忆，那些一起学习、一起玩耍的日子，至今仍历历在目。虽然我们现在各自忙碌，但这份同学情谊永远不会改变。</p>
            <p>愿你在未来的日子里，成绩杠杠好，每天都能收获满满的快乐和感动！</p>
        </div>
        <ul class="wish-list">
            <li>✨ 愿你好好休息，不要累垮自己</li>
            <li>📚 愿你作业少一点，睡眠多一点</li>
            <li>😌 愿心想事成，莫忘我们这些初中老同学</li>
            <li>🎓 愿你成绩杠杠好，学业有成</li>
        </ul>
        <div class="music-control">
            <button class="play-button" onclick="playBirthdaySong()">播放生日歌</button>
        </div>
        <div class="footer">
            <p>来自初中老同学许匀祎的美好祝福</p>
            <p>2026年3月28日</p>
        </div>
    </div>
    
    <script>
        // 生日歌音频元素
        let audio = null;
        
        // 播放生日歌
        function playBirthdaySong() {
            if (audio) {
                audio.pause();
                audio.currentTime = 0;
            }
            
            // 使用Web Audio API生成生日歌
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            // 生日歌旋律 (C大调)
            const melody = [
                { note: 'C4', duration: 0.5 },
                { note: 'C4', duration: 0.5 },
                { note: 'D4', duration: 1 },
                { note: 'C4', duration: 1 },
                { note: 'F4', duration: 1 },
                { note: 'E4', duration: 2 },
                { note: 'C4', duration: 0.5 },
                { note: 'C4', duration: 0.5 },
                { note: 'D4', duration: 1 },
                { note: 'C4', duration: 1 },
                { note: 'G4', duration: 1 },
                { note: 'F4', duration: 2 },
                { note: 'C4', duration: 0.5 },
                { note: 'C4', duration: 0.5 },
                { note: 'C5', duration: 1 },
                { note: 'A4', duration: 1 },
                { note: 'F4', duration: 1 },
                { note: 'E4', duration: 1 },
                { note: 'D4', duration: 2 },
                { note: 'B4', duration: 0.5 },
                { note: 'B4', duration: 0.5 },
                { note: 'A4', duration: 1 },
                { note: 'F4', duration: 1 },
                { note: 'G4', duration: 1 },
                { note: 'F4', duration: 2 }
            ];
            
            // 音符频率映射
            const noteFrequencies = {
                'C4': 261.63,
                'D4': 293.66,
                'E4': 329.63,
                'F4': 349.23,
                'G4': 392.00,
                'A4': 440.00,
                'B4': 493.88,
                'C5': 523.25
            };
            
            // 播放旋律（不循环）
            let time = audioContext.currentTime;
            melody.forEach(({ note, duration }) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = noteFrequencies[note];
                oscillator.type = 'sine';
                
                // 音量渐变
                gainNode.gain.setValueAtTime(0, time);
                gainNode.gain.linearRampToValueAtTime(0.3, time + 0.1);
                gainNode.gain.linearRampToValueAtTime(0, time + duration - 0.1);
                
                oscillator.start(time);
                oscillator.stop(time + duration);
                
                time += duration;
            });
        }
        
        // 添加一些交互效果
        document.addEventListener('DOMContentLoaded', function() {
            // 自动播放生日歌
            setTimeout(playBirthdaySong, 1000);
            
            // 点击许愿列表项时的动画
            const wishItems = document.querySelectorAll('.wish-list li');
            wishItems.forEach(item => {
                item.addEventListener('click', function() {
                    this.style.transform = 'scale(1.05)';
                    this.style.backgroundColor = '#dbeafe';
                    setTimeout(() => {
                        this.style.transform = 'scale(1)';
                        this.style.backgroundColor = '#eff6ff';
                    }, 300);
                });
            });
        });
    </script>
